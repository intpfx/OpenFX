name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  deno-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x
      - name: Format check
        run: deno fmt --check .
      - name: Lint
        run: deno lint .
      - name: Test
        run: deno task test
      - name: Build web app
        run: deno task --config apps/web/deno.json build
