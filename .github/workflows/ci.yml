name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  deno-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x
      - name: Format check
        run: deno fmt --check .
      - name: Lint
        run: deno lint .
      - name: Deno-only guard
        run: deno task guard:deno-only
      - name: Test
        run: deno task test
      - name: Prepare web build metadata
        id: web-build-meta
        run: |
          echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "hash=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build web app
        env:
          VITE_OPENFX_BUILD_HASH: ${{ steps.web-build-meta.outputs.hash }}
          VITE_OPENFX_BUILD_TIME: ${{ steps.web-build-meta.outputs.time }}
        run: deno task --config entry/web/deno.json build
